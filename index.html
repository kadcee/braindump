<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brain Dump</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --surface-0:#f5f4f0;--surface-1:#faf9f6;--surface-2:#ffffff;
  --text-primary:#1a1a18;--text-secondary:#6b6b68;--text-muted:#aaa;
  --border:rgba(0,0,0,.1);--border-strong:rgba(0,0,0,.15);
  --bg-accent:#e6f1fb;--border-accent:#378add;--text-accent:#185fa5;
  --bg-danger:#fcebeb;--border-danger:#f09595;--text-danger:#a32d2d;
  --radius:8px;
}
.dark{
  --surface-0:#18181b;--surface-1:#1f1f23;--surface-2:#27272b;
  --text-primary:#f0f0ee;--text-secondary:#a0a09d;--text-muted:#666;
  --border:rgba(255,255,255,.08);--border-strong:rgba(255,255,255,.14);
  --bg-accent:#1a2d42;--border-accent:#378add;--text-accent:#6ab0f5;
  --bg-danger:#2d1a1a;--border-danger:#7a3535;--text-danger:#f09595;
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--surface-0);color:var(--text-primary);min-height:100vh}
#app{display:flex;height:100vh;width:100vw;overflow:hidden}

.sidebar{flex-shrink:0;width:220px;background:var(--surface-1);border-right:0.5px solid var(--border);display:flex;flex-direction:column;padding:1rem 0;overflow-y:auto;transition:width .2s}
.sidebar.collapsed{width:48px}
.sidebar-logo{padding:.5rem 1rem 1rem;font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden}
.sidebar-logo span{opacity:.4;font-size:11px;display:block;font-weight:400;margin-top:1px}
.sidebar.collapsed .sidebar-logo{font-size:0;padding:.5rem 0 1rem;text-align:center}
.nav-item{padding:.45rem 1rem;cursor:pointer;font-size:13px;color:var(--text-secondary);display:flex;align-items:center;gap:8px;transition:background .15s;white-space:nowrap;overflow:hidden}
.nav-item:hover{background:var(--surface-2);color:var(--text-primary)}
.nav-item.active{background:var(--bg-accent);color:var(--text-accent);font-weight:500}
.nav-item i{font-size:15px;flex-shrink:0}
.sidebar.collapsed .nav-item{padding:.45rem 0;justify-content:center}
.sidebar.collapsed .nav-label{display:none}
.sidebar.collapsed .cat-dot{display:none}
.sidebar.collapsed .sidebar-section{display:none}
.sidebar.collapsed .export-msg{display:none}
.sidebar-section{padding:.5rem 1rem .25rem;font-size:10px;letter-spacing:.06em;color:var(--text-muted);text-transform:uppercase;margin-top:.5rem}
.cat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block}
.sidebar-toggle{width:100%;padding:.35rem;border:none;background:transparent;cursor:pointer;color:var(--text-muted);font-size:18px;display:flex;align-items:center;justify-content:center;margin-bottom:.25rem}
.sidebar-toggle:hover{color:var(--text-primary)}
.dark-toggle{width:100%;padding:.35rem;border:none;background:transparent;cursor:pointer;color:var(--text-muted);font-size:15px;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:.25rem}
.dark-toggle:hover{color:var(--text-primary)}

.main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
.topbar{width:100%;padding:.6rem 1rem;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:.5rem;background:var(--surface-1);flex-shrink:0}

@media(max-width:600px){
  .content{padding:1rem}
  .due-input{display:none!important}
  .idea-mini-select{display:none!important}
  .sidebar{width:44px!important;min-width:44px!important}
  .sidebar-logo{display:none}
  .sidebar-section{display:none}
  .nav-item{padding:.5rem 0;justify-content:center;gap:0}
  .nav-label{display:none}
  .cat-dot{display:none}
  .sidebar-toggle{display:none}
  .export-msg{display:none}
  .sidebar-cat-count{display:none}
  .sidebar-add-cat{display:none}
}
.search-wrap{flex:1;display:flex;align-items:center;gap:8px;background:var(--surface-0);border:0.5px solid var(--border);border-radius:var(--radius);padding:.35rem .75rem}
.search-wrap input{border:none;background:transparent;font-size:13px;color:var(--text-primary);outline:none;flex:1}
.search-wrap i{color:var(--text-muted);font-size:14px}
.btn{border:0.5px solid var(--border-strong);background:transparent;border-radius:var(--radius);padding:.35rem .75rem;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;color:var(--text-primary);transition:background .15s}
.btn:hover{background:var(--surface-0)}
.btn.primary{background:var(--text-primary);color:var(--surface-0);border-color:transparent}
.btn.primary:hover{opacity:.85}
.dark .btn.primary{background:#6ab0f5;color:#0a1929;border-color:transparent}
.btn.active{background:var(--bg-accent);color:var(--text-accent);border-color:var(--border-accent)}
.btn i{font-size:14px}

.content{flex:1;min-height:0;overflow-y:auto;padding:1.25rem;width:100%}

.capture-box{background:var(--surface-2);border:0.5px solid var(--border-strong);border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem}
.capture-row{display:flex;gap:.5rem;align-items:flex-end}
.capture-textarea{flex:1;border:none;background:transparent;resize:none;font-size:15px;color:var(--text-primary);outline:none;font-family:inherit;line-height:1.5;min-height:54px}
.capture-textarea::placeholder{color:var(--text-muted)}
.capture-actions{display:flex;gap:.4rem;align-items:center}
.icon-btn{width:32px;height:32px;border:0.5px solid var(--border-strong);background:var(--surface-1);border-radius:var(--radius);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);transition:all .15s}
.icon-btn:hover{background:var(--surface-0);color:var(--text-primary)}
.icon-btn.recording{background:var(--bg-danger);border-color:var(--border-danger);color:var(--text-danger)}
.icon-btn i{font-size:15px}
.ai-status{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-muted);padding:.4rem 0}
.ai-dot{width:6px;height:6px;border-radius:50%;background:var(--text-muted);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

.category-section{background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;margin-bottom:.75rem}
.cat-header{padding:.65rem 1rem;display:flex;align-items:center;gap:.6rem;background:var(--surface-1);border-bottom:0.5px solid var(--border)}
.cat-header:hover .cat-actions{opacity:1}
.cat-title{font-size:13px;font-weight:500;flex:1}
.cat-count{font-size:11px;color:var(--text-muted);background:var(--surface-0);padding:1px 7px;border-radius:20px}
.cat-actions{display:flex;gap:.3rem;opacity:0;transition:opacity .15s}
.cat-header:hover .cat-actions{opacity:1}
.sidebar-cat-actions{display:none;gap:.2rem;align-items:center;margin-left:auto}
.nav-item:hover .sidebar-cat-actions{display:flex}
.sidebar-cat-edit-btn{width:20px;height:20px;border:none;background:transparent;cursor:pointer;border-radius:3px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:12px;padding:0}
.sidebar-cat-edit-btn:hover{background:var(--surface-0);color:var(--text-primary)}
@media(max-width:600px){.sidebar-cat-actions{display:none!important}}
.cat-mini-btn{width:24px;height:24px;border:none;background:transparent;cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:13px}
.cat-mini-btn:hover{background:var(--surface-0);color:var(--text-primary)}

.idea-card{padding:.7rem 1rem;border-bottom:0.5px solid var(--border);display:flex;gap:.6rem;align-items:flex-start;cursor:grab;transition:background .15s;user-select:none}
.idea-card:last-child{border-bottom:none}
.idea-card:hover{background:var(--surface-1)}
.idea-card:hover .idea-controls{opacity:1}
.idea-card.dragging{opacity:.4;cursor:grabbing}
.idea-card.drag-over{background:var(--bg-accent)}
.idea-body{flex:1;min-width:0}
.idea-text{font-size:14px;line-height:1.5;color:var(--text-primary);word-break:break-word}
.idea-meta{display:flex;align-items:center;gap:.4rem;margin-top:.3rem;flex-wrap:wrap}
.idea-time{font-size:11px;color:var(--text-muted)}
.status-badge{font-size:10px;padding:1px 7px;border-radius:20px;font-weight:500}
.status-revisit{background:#faeeda;color:#854f0b}
.status-explore{background:#e1f5ee;color:#0f6e56}
.status-archive{background:#f1efe8;color:#5f5e5a}
.star-btn{background:none;border:none;cursor:pointer;font-size:16px;color:var(--text-muted);padding:0;line-height:1;transition:color .15s;margin-top:1px}
.star-btn:hover,.star-btn.on{color:#ba7517}
.idea-controls{display:flex;gap:.2rem;opacity:0;align-items:center;transition:opacity .15s}
.idea-card:hover .idea-controls{opacity:1}
@media(max-width:600px){.idea-controls{opacity:1}}
.idea-mini-btn{width:22px;height:22px;border:none;background:transparent;cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:12px}
.idea-mini-btn:hover{background:var(--surface-0);color:var(--text-primary)}
.idea-mini-select{height:22px;border:0.5px solid var(--border);border-radius:4px;background:var(--surface-0);color:var(--text-secondary);font-size:11px;padding:0 2px;cursor:pointer;max-width:80px}
.idea-mini-select:hover{border-color:var(--border-strong);color:var(--text-primary)}
.idea-edit-area{width:100%;border:none;border-bottom:1px solid var(--border-accent,#378add);background:transparent;font-size:14px;line-height:1.5;color:var(--text-primary);outline:none;font-family:inherit;resize:none;padding:0;margin-bottom:.25rem}
.conn-pill{font-size:10px;color:var(--text-accent);background:var(--bg-accent);padding:1px 7px;border-radius:20px;cursor:pointer;border:none}

.status-menu{position:absolute;background:var(--surface-2);border:0.5px solid var(--border);border-radius:var(--radius);box-shadow:0 4px 12px rgba(0,0,0,.08);z-index:50;min-width:150px;overflow:hidden;top:100%;right:0;margin-top:4px}
.move-menu{position:absolute;background:var(--surface-2);border:0.5px solid var(--border);border-radius:var(--radius);box-shadow:0 4px 12px rgba(0,0,0,.08);z-index:50;min-width:160px;overflow:hidden;top:100%;right:0;margin-top:4px;max-height:200px;overflow-y:auto}
.move-opt{padding:.4rem .75rem;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:.5rem}
.move-opt:hover{background:var(--surface-1)}
.status-opt{padding:.4rem .75rem;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:.5rem}
.status-opt:hover{background:var(--surface-1)}
.idea-ctrl-wrap{position:relative}

.map-container{width:100%;height:calc(100vh - 120px);position:relative;overflow:auto;background:var(--surface-0);border-radius:12px;border:0.5px solid var(--border)}
.map-node{position:absolute;background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;padding:.5rem .8rem;cursor:grab;min-width:110px;max-width:190px;transition:box-shadow .15s;user-select:none}
.map-node:hover{border-color:var(--border-strong);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.map-node.dragging{box-shadow:0 4px 16px rgba(0,0,0,.1);border-color:var(--border-accent);cursor:grabbing;z-index:10}
.map-node.cat-node{background:var(--surface-1);font-weight:500;font-size:13px}
.map-node .node-text{font-size:12px;line-height:1.4;color:var(--text-primary)}
.map-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}

.week-grid{display:grid;gap:1rem}
.digest-header{background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem}
.digest-stat{display:flex;gap:1.5rem;margin-top:.5rem}
.digest-num{font-size:22px;font-weight:500}
.digest-label{font-size:11px;color:var(--text-muted)}
.week-day{background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;overflow:hidden}
.week-day-header{padding:.5rem 1rem;background:var(--surface-1);border-bottom:0.5px solid var(--border);font-size:12px;font-weight:500;color:var(--text-secondary)}
.week-idea{padding:.4rem 1rem;font-size:13px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:.5rem}
.week-idea:last-child{border-bottom:none}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--surface-2);border-radius:12px;border:0.5px solid var(--border);padding:1.25rem;width:380px;max-width:90vw}
.modal h3{font-size:15px;font-weight:500;margin-bottom:1rem}
.modal input,.modal select,.modal textarea{width:100%;border:0.5px solid var(--border);border-radius:var(--radius);padding:.45rem .75rem;font-size:13px;background:var(--surface-1);color:var(--text-primary);outline:none;margin-bottom:.6rem;font-family:inherit}
.modal input:focus,.modal select:focus{border-color:var(--border-accent)}
.modal-actions{display:flex;gap:.5rem;justify-content:flex-end;margin-top:.25rem}

.cat-title-edit{background:transparent;border:none;border-bottom:1px solid var(--border-accent);font-size:13px;font-weight:500;color:var(--text-primary);outline:none;padding:0 2px;width:140px;font-family:inherit}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--text-muted);font-size:14px;line-height:1.8}
.priority-section{background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;margin-bottom:.75rem;width:100%}
.priority-header{padding:.65rem 1rem;display:flex;align-items:center;gap:.6rem;background:var(--surface-1);border-bottom:0.5px solid var(--border)}
.priority-title{font-size:13px;font-weight:500;flex:1}
.priority-count{font-size:11px;color:var(--text-muted);background:var(--surface-0);padding:1px 7px;border-radius:20px}
.unsorted-banner{display:flex;align-items:center;gap:.5rem;padding:.5rem 1rem;font-size:12px;background:#fdf6ec;border-bottom:0.5px solid #f0d9b5;color:#854f0b}
.unsorted-banner i{font-size:14px}
.idea-cat-pill{font-size:10px;padding:1px 7px;border-radius:20px;font-weight:400;background:var(--surface-0);color:var(--text-secondary);border:0.5px solid var(--border)}
.due-pill{font-size:10px;padding:1px 7px;border-radius:20px;font-weight:500;display:inline-flex;align-items:center;gap:3px;cursor:pointer;border:none;background:transparent}
.due-pill.overdue{background:#fcebeb;color:#a32d2d;border:0.5px solid #f09595}
.due-pill.soon{background:#faeeda;color:#854f0b;border:0.5px solid #f0c070}
.due-pill.ok{background:var(--surface-0);color:var(--text-secondary);border:0.5px solid var(--border)}
.due-input{border:0.5px solid var(--border-accent,#378add);border-radius:6px;font-size:11px;padding:2px 6px;color:var(--text-accent,#185fa5);background:var(--bg-accent,#e6f1fb);outline:none;width:130px;margin-left:4px}
.empty-state i{font-size:32px;display:block;margin-bottom:.75rem}
.export-msg{padding:.4rem 1rem;font-size:11px;color:var(--text-accent)}
.drop-zone{border:1.5px dashed var(--border-strong);border-radius:12px;padding:1.25rem;text-align:center;font-size:13px;color:var(--text-muted);margin-bottom:1rem;transition:all .15s;cursor:pointer;background:var(--surface-2)}
@media(max-width:600px){.drop-zone{display:none}}
.drop-zone:hover,.drop-zone.drag-active{border-color:var(--border-accent);background:var(--bg-accent);color:var(--text-accent)}
.drop-zone i{font-size:22px;display:block;margin-bottom:.4rem}
.drop-zone span{font-size:11px;display:block;margin-top:.25rem;opacity:.7}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:2px}
</style>
</head>
<body>
<div id="app"></div>
<script>
const {useState,useEffect,useRef,useCallback,createElement:h}=React;

const CAT_COLORS={Work:'#185fa5',Personal:'#0f6e56',Ideas:'#854f0b',Health:'#a32d2d',Learning:'#534ab7',Goals:'#3b6d11',Finance:'#99355e',Misc:'#5f5e5a'};
const STATUS_OPTS=[{v:'revisit',l:'Revisit soon',c:'status-revisit'},{v:'explore',l:'Explore later',c:'status-explore'},{v:'archive',l:'Archive',c:'status-archive'}];
const STORAGE_KEY='braindump_v4';

function load(){
  try{const d=localStorage.getItem(STORAGE_KEY);if(d)return JSON.parse(d);}catch(e){}
  return{ideas:[],categories:['Work','Personal','Ideas','Health','Learning','Goals','Finance','Misc'],connections:[]};
}
function save(data){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(data));}catch(e){}}
function uid(){return'id_'+Date.now()+'_'+Math.random().toString(36).slice(2);}
function ts(){return new Date().toISOString();}
function fmtTime(iso){
  const d=new Date(iso),diff=Date.now()-d;
  if(diff<60000)return'just now';
  if(diff<3600000)return Math.floor(diff/60000)+'m ago';
  if(diff<86400000)return Math.floor(diff/3600000)+'h ago';
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

async function aiCategorize(text){
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',max_tokens:300,
        messages:[{role:'user',content:`You are a personal thought organizer. Analyze this thought and return ONLY valid JSON with no markdown:
{"category":"<one of: Work, Personal, Ideas, Health, Learning, Goals, Finance, Misc>","status":"<one of: revisit, explore, archive, or null>"}

Rules for status:
- "revisit": time-sensitive, has a deadline, needs action soon, contains words like "by", "this week", "today", "need to", "must", "birthday", "deadline", "challenge", "plan for"
- "explore": interesting idea worth developing later, no urgency, creative or future-oriented
- "archive": completed, resolved, or purely informational with no action needed
- null: unclear urgency, let the user decide

Thought: ${text}`}]
      })
    });
    const data=await r.json();
    const txt=(data.content||[]).find(b=>b.type==='text')?.text||'{}';
    const parsed=JSON.parse(txt.replace(/```json|```/g,'').trim());
    return {category:parsed.category||'Misc',status:parsed.status||null};
  }catch(e){return{category:'Misc',status:null};}
}

function parseLocalDate(s){if(!s)return null;const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function duePillClass(due){
  if(!due)return'ok';
  const d=parseLocalDate(due),now=new Date();
  now.setHours(0,0,0,0);d.setHours(0,0,0,0);
  const diff=(d-now)/(1000*60*60*24);
  if(diff<0)return'overdue';
  if(diff<=2)return'soon';
  return'ok';
}
function fmtDue(due){
  if(!due)return'';
  const d=parseLocalDate(due),now=new Date();
  now.setHours(0,0,0,0);d.setHours(0,0,0,0);
  const diff=(d-now)/(1000*60*60*24);
  if(diff<0)return'Overdue';
  if(diff===0)return'Today';
  if(diff===1)return'Tomorrow';
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
const CAT_ICONS={'Work':'ti-briefcase','Personal':'ti-user','Ideas':'ti-bulb','Health':'ti-heart','Learning':'ti-book','Goals':'ti-target','Finance':'ti-coin','Misc':'ti-dots'};
function CatDot({cat}){return h('span',{className:'cat-dot',style:{background:CAT_COLORS[cat]||'#888'}});}
function CatIcon({cat}){return h('i',{className:'ti '+(CAT_ICONS[cat]||'ti-tag'),style:{fontSize:15,color:CAT_COLORS[cat]||'var(--text-muted)'}});}

function StatusBadge({status}){
  const s=STATUS_OPTS.find(o=>o.v===status);
  return s?h('span',{className:'status-badge '+s.c},s.l):null;
}

function IdeaCard({idea,allCategories,connections,onUpdate,onDelete,onConnect,dragging,dragOver,onDragStart,onDragEnd,onDragOver,onDrop}){
  const [showStatus,setShowStatus]=useState(false);
  const [editing,setEditing]=useState(false);
  const [editVal,setEditVal]=useState('');
  const ref=useRef();
  const editRef=useRef();
  useEffect(()=>{
    function click(e){if(ref.current&&!ref.current.contains(e.target))setShowStatus(false);}
    document.addEventListener('mousedown',click);
    return()=>document.removeEventListener('mousedown',click);
  },[]);
  useEffect(()=>{
    if(editing&&editRef.current){
      editRef.current.focus();
      editRef.current.style.height='auto';
      editRef.current.style.height=editRef.current.scrollHeight+'px';
    }
  },[editing]);
  function startEdit(){setEditVal(idea.text);setEditing(true);}
  function finishEdit(){const v=editVal.trim();if(v&&v!==idea.text)onUpdate({text:v});setEditing(false);}
  function cancelEdit(){setEditing(false);}
  const myConns=connections.filter(c=>c.from===idea.id||c.to===idea.id);
  const cats=allCategories||[];
  return h('div',{
    className:'idea-card'+(dragging?' dragging':'')+(dragOver?' drag-over':''),
    draggable:!editing,
    onDragStart:e=>{if(editing){e.preventDefault();return;}e.dataTransfer.effectAllowed='move';onDragStart(idea.id);},
    onDragEnd:onDragEnd,
    onDragOver:e=>{e.preventDefault();onDragOver(idea.id);},
    onDrop:e=>{e.preventDefault();onDrop(idea.category);}
  },

const MAP_POS_KEY='braindump_mappos';
function MapView({ideas,categories,connections}){
  const [pos,setPos]=useState(()=>{
    try{const saved=localStorage.getItem(MAP_POS_KEY);if(saved){const p=JSON.parse(saved);if(Object.keys(p).length>0)return p;}}catch(e){}
    const p={};
    categories.forEach((cat,i)=>{p['CAT_'+cat]={x:20+((i%4)*240),y:40+Math.floor(i/4)*300};});
    ideas.forEach((idea)=>{
      const ci=categories.indexOf(idea.category);
      const baseX=20+((ci%4)*240)+5;
      const baseY=40+Math.floor(ci/4)*300+65;
      const same=ideas.filter(x=>x.category===idea.category);
      const off=same.indexOf(idea);
      p[idea.id]={x:baseX+(off%2)*115,y:baseY+Math.floor(off/2)*90};
    });
    return p;
  });
  const [dragging,setDragging]=useState(null);
  const [dragOff,setDragOff]=useState({x:0,y:0});
  const ref=useRef();

  function onMouseDown(e,id){
    e.preventDefault();
    const r=ref.current.getBoundingClientRect();
    setDragging(id);
    setDragOff({x:e.clientX-r.left-(pos[id]?.x||0),y:e.clientY-r.top-(pos[id]?.y||0)});
  }
  function onMouseMove(e){
    if(!dragging)return;
    const r=ref.current.getBoundingClientRect();
    setPos(p=>({...p,[dragging]:{...p[dragging],x:e.clientX-r.left-dragOff.x,y:e.clientY-r.top-dragOff.y}}));
  }
  function savePos(p){try{localStorage.setItem(MAP_POS_KEY,JSON.stringify(p));}catch(e){}}
  const catsWithIdeas=categories.filter(c=>ideas.some(i=>i.category===c));
  function resetPos(){try{localStorage.removeItem(MAP_POS_KEY);}catch(e){}window.location.reload();}
  const mapW=Math.max(960,categories.length*240+100);
  const mapH=Math.max(600,Math.ceil(categories.length/4)*300+100);
  return h('div',{className:'map-container',ref,onMouseMove,onMouseUp:()=>{if(dragging){savePos(pos);}setDragging(null);},onMouseLeave:()=>setDragging(null)},
    h('div',{style:{position:'sticky',top:10,right:10,zIndex:5,display:'flex',gap:6,alignItems:'center',justifyContent:'flex-end',pointerEvents:'none',padding:'0 10px'}},      h('span',{style:{pointerEvents:'all',fontSize:11,color:'var(--text-muted)',background:'var(--surface-1)',border:'0.5px solid var(--border)',borderRadius:6,padding:'2px 8px',display:'flex',alignItems:'center',gap:4}},
        h('i',{className:'ti ti-device-floppy',style:{fontSize:11}}),'Positions saved'
      ),
      h('button',{onClick:resetPos,style:{pointerEvents:'all',fontSize:11,color:'var(--text-muted)',background:'var(--surface-1)',border:'0.5px solid var(--border)',borderRadius:6,padding:'2px 8px',cursor:'pointer'}},'Reset')
    ),
    h('div',{style:{position:'relative',width:mapW,height:mapH,minWidth:'100%',minHeight:'100%'}},
    h('svg',{style:{position:'absolute',top:0,left:0,width:mapW,height:mapH,pointerEvents:'none'}},
      connections.map(conn=>{
        const f=pos[conn.from],t=pos[conn.to];
        if(!f||!t)return null;
        return h('line',{key:conn.id,x1:f.x+80,y1:f.y+25,x2:t.x+80,y2:t.y+25,stroke:'#378add',strokeWidth:1.5,strokeDasharray:'5,3',opacity:.7});
      }),
      catsWithIdeas.map(cat=>ideas.filter(i=>i.category===cat).map(idea=>{
        const cn=pos['CAT_'+cat],ni=pos[idea.id];
        if(!cn||!ni)return null;
        return h('line',{key:'l_'+idea.id,x1:cn.x+55,y1:cn.y+30,x2:ni.x+75,y2:ni.y,stroke:CAT_COLORS[cat]||'rgba(128,128,128,.5)',strokeWidth:1.5,opacity:.5});
      }))
    ),
    catsWithIdeas.map(cat=>{
      const n=pos['CAT_'+cat];if(!n)return null;
      const color=CAT_COLORS[cat]||'#888';
      return h('div',{key:'cat_'+cat,className:'map-node cat-node',style:{left:n.x,top:n.y,borderLeft:`3px solid ${color}`},onMouseDown:e=>onMouseDown(e,'CAT_'+cat)},
        h('span',{style:{display:'flex',alignItems:'center',gap:6}},h('span',{style:{width:7,height:7,borderRadius:'50%',background:color,display:'inline-block'}}),cat)
      );
    }),
    ideas.map(idea=>{
      const n=pos[idea.id];if(!n)return null;
      return h('div',{key:idea.id,className:'map-node'+(dragging===idea.id?' dragging':''),style:{left:n.x,top:n.y},onMouseDown:e=>onMouseDown(e,idea.id)},
        h('div',{className:'node-text'},idea.text.length>55?idea.text.slice(0,52)+'...':idea.text),
        idea.starred&&h('span',{style:{color:'#ba7517',fontSize:11}},' ★'),
        idea.status&&h('div',{style:{marginTop:3}},h(StatusBadge,{status:idea.status}))
      );
    })
    )
  );
}

function WeekView({ideas}){
  const days={};
  ideas.forEach(idea=>{
    const d=new Date(idea.created);
    const key=d.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
    if(!days[key])days[key]=[];
    days[key].push(idea);
  });
  const sorted=Object.entries(days).sort((a,b)=>new Date(b[1][0].created)-new Date(a[1][0].created)).slice(0,7);
  const starred=ideas.filter(i=>i.starred).length;
  const revisit=ideas.filter(i=>i.status==='revisit').length;
  const explore=ideas.filter(i=>i.status==='explore').length;
  const archived=ideas.filter(i=>i.status==='archive').length;
  return h('div',{className:'week-grid'},
    h('div',{className:'digest-header'},

        h('div',null,h('div',{className:'digest-num'},starred),h('div',{className:'digest-label'},'starred')),
        h('div',null,h('div',{className:'digest-num'},revisit),h('div',{className:'digest-label'},'revisit soon')),
        h('div',null,h('div',{className:'digest-num'},explore),h('div',{className:'digest-label'},'explore later')),

    ),

    sorted.map(([day,dayIdeas])=>h('div',{key:day,className:'week-day'},

        h(StatusBadge,{status:idea.status})

function App(){
  const [data,setData]=useState(load);
  const {ideas,categories,connections}=data;
  const upd=useCallback(patch=>setData(d=>{const n={...d,...patch};save(n);return n;}),[]);

  const [view,setView]=useState('capture');
  const [search,setSearch]=useState('');
  const [text,setText]=useState('');
  const [aiMsg,setAiMsg]=useState('');
  const [recording,setRecording]=useState(false);
  const [editCat,setEditCat]=useState(null);
  const [editCatVal,setEditCatVal]=useState('');
  const [mergeModal,setMergeModal]=useState(null);
  const [connModal,setConnModal]=useState(null);
  const [connTarget,setConnTarget]=useState('');
  const [dragId,setDragId]=useState(null);
  const [dragOverId,setDragOverId]=useState(null);
  const [exportMsg,setExportMsg]=useState('');
  const [sidebarOpen,setSidebarOpen]=useState(true);
  const [darkMode,setDarkMode]=useState(()=>{try{return localStorage.getItem('braindump_dark')==='1';}catch(e){return false;}});
  const [statusFilter,setStatusFilter]=useState('');
  useEffect(()=>{
    document.body.classList.toggle('dark',darkMode);
    try{localStorage.setItem('braindump_dark',darkMode?'1':'0');}catch(e){}
  },[darkMode]);
  const recogRef=useRef();
  const taRef=useRef();
  const [dropActive,setDropActive]=useState(false);

  function processImportFile(file){
    if(!file||!file.name.endsWith('.json')){setExportMsg('Please drop a .json file.');setTimeout(()=>setExportMsg(''),3000);return;}
    const reader=new FileReader();
    reader.onload=evt=>{
      try{
        const parsed=JSON.parse(evt.target.result);
        if(!parsed.ideas||!Array.isArray(parsed.ideas)){setExportMsg('Invalid file.');return;}
        const mergedCats=[...new Set([...(parsed.categories||[]),...categories])];
        const mergedIdeas=[...parsed.ideas,...ideas.filter(i=>!parsed.ideas.find(p=>p.id===i.id))];
        const usedCats=new Set(mergedIdeas.map(i=>i.category));
        const cleanCats=mergedCats.filter(c=>usedCats.has(c)||['Work','Personal','Ideas','Health','Learning','Goals','Finance','Misc'].includes(c));
        const merged={
          ideas:mergedIdeas,
          categories:cleanCats,
          connections:[...parsed.connections||[],...connections.filter(c=>!parsed.connections?.find(p=>p.id===c.id))]
        };
        upd(merged);
        setExportMsg('Imported '+parsed.ideas.length+' ideas.');
        setTimeout(()=>setExportMsg(''),4000);
      }catch(err){setExportMsg('Could not read file.');}
    };
    reader.readAsText(file);
  }

  const filtered=ideas.filter(i=>{
    const s=search.toLowerCase();
    const matchesSearch=!search||i.text.toLowerCase().includes(s)||i.category.toLowerCase().includes(s)||(i.status||'').toLowerCase().includes(s);
    const matchesStatus=!statusFilter||(statusFilter==='starred'?i.starred:i.status===statusFilter);
    return matchesSearch&&matchesStatus;
  });

  async function capture(){
    if(!text.trim())return;
    const t=text.trim();
    setText('');
    setAiMsg('AI is organizing...');
    const result=await aiCategorize(t);
    const finalCat=categories.includes(result.category)?result.category:'Misc';
    const idea={id:uid(),text:t,category:finalCat,created:ts(),starred:false,status:result.status||null};
    upd({ideas:[idea,...ideas]});
    setAiMsg('');
    if(quick)taRef.current?.focus();
  }

  function startVoice(){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert('Voice input not supported in this browser. Try Chrome.');return;}
    const r=new SR();
    r.continuous=false;r.interimResults=false;r.lang='en-US';
    r.onresult=e=>setText(p=>p+(p?' ':'')+e.results[0][0].transcript);
    r.onend=()=>setRecording(false);
    r.start();recogRef.current=r;setRecording(true);
  }
  function stopVoice(){recogRef.current?.stop();}

  function updateIdea(id,patch){upd({ideas:ideas.map(i=>i.id===id?{...i,...patch}:i)});}
  function deleteIdea(id){upd({ideas:ideas.filter(i=>i.id!==id),connections:connections.filter(c=>c.from!==id&&c.to!==id)});}

  function startEditCat(cat){setEditCat(cat);setEditCatVal(cat);}
  function finishEditCat(){
    if(!editCatVal.trim()){
      // delete the category if it has no ideas
      if(!ideas.some(i=>i.category===editCat)){upd({categories:categories.filter(c=>c!==editCat)});}
      setEditCat(null);return;
    }
    if(editCatVal===editCat){setEditCat(null);return;}
    upd({categories:categories.map(c=>c===editCat?editCatVal:c),ideas:ideas.map(i=>i.category===editCat?{...i,category:editCatVal}:i)});
    setEditCat(null);
  }

  const [newCatModal,setNewCatModal]=useState(false);
  const [newCatVal,setNewCatVal]=useState('');
  function addCategory(){setNewCatVal('');setNewCatModal(true);}
  function confirmAddCategory(){
    const name=newCatVal.trim();
    if(!name||categories.includes(name)){setNewCatModal(false);return;}
    upd({categories:[...categories,name]});
    setNewCatModal(false);
  }

  function doMerge(into){
    if(!mergeModal||!into||into===mergeModal)return;
    upd({ideas:ideas.map(i=>i.category===mergeModal?{...i,category:into}:i),categories:categories.filter(c=>c!==mergeModal)});
    setMergeModal(null);
  }

  function addConnection(){
    if(!connModal||!connTarget)return;
    if(connections.find(c=>(c.from===connModal&&c.to===connTarget)||(c.from===connTarget&&c.to===connModal)))return;
    upd({connections:[...connections,{id:uid(),from:connModal,to:connTarget}]});
    setConnModal(null);
  }

  function exportJSON(){
    const blob=new Blob([JSON.stringify({ideas,categories,connections,exported:new Date().toISOString()},null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download='braindump-'+Date.now()+'.json';
    a.click();URL.revokeObjectURL(url);
    setExportMsg('Downloaded.');
    setTimeout(()=>setExportMsg(''),4000);
  }

  function importJSON(e){
    const file=e.target.files[0];
    if(!file)return;
    processImportFile(file);
    e.target.value='';
  }

  // priority view — no category grouping needed in main view
  const navItems=[{id:'capture',icon:'ti-bolt',l:'Capture'},{id:'focus',icon:'ti-focus-2',l:"Today's focus"},{id:'map',icon:'ti-network',l:'Mind map'},{id:'week',icon:'ti-calendar-week',l:'Weekly digest'}];

  return h('div',{id:'app'},
    h('div',{className:'sidebar'+(sidebarOpen?'':' collapsed')},
      h('button',{className:'sidebar-toggle',onClick:()=>setSidebarOpen(o=>!o)},sidebarOpen?'←':'→'),
      sidebarOpen&&h('div',{className:'sidebar-logo'},'Brain Dump',h('span',null,'personal thought space')),
      navItems.map(n=>h('div',{key:n.id,className:'nav-item'+(view===n.id?' active':''),onClick:()=>setView(n.id)},h('i',{className:'ti '+n.icon}),h('span',{className:'nav-label'},n.l))),
      h('div',{className:'sidebar-section'},'Views'),
      h('div',{className:'nav-item'+(statusFilter==='starred'?' active':''),onClick:()=>{setView('capture');setStatusFilter(f=>f==='starred'?'':'starred');}},
        h('i',{className:'ti ti-star'}),h('span',{className:'nav-label'},'Starred'),
        h('span',{className:'sidebar-cat-count',style:{marginLeft:'auto',fontSize:11,color:'var(--text-muted)'}},ideas.filter(i=>i.starred).length||'')
      ),
      h('div',{className:'nav-item'+(statusFilter==='revisit'?' active':''),onClick:()=>{setView('capture');setStatusFilter(f=>f==='revisit'?'':'revisit');}},
        h('span',{style:{width:8,height:8,borderRadius:'50%',background:'#854f0b',display:'inline-block',flexShrink:0}}),
        h('span',{className:'nav-label'},'Revisit Soon'),
        h('span',{className:'sidebar-cat-count',style:{marginLeft:'auto',fontSize:11,color:'var(--text-muted)'}},ideas.filter(i=>i.status==='revisit').length||'')
      ),
      h('div',{className:'nav-item'+(statusFilter==='explore'?' active':''),onClick:()=>{setView('capture');setStatusFilter(f=>f==='explore'?'':'explore');}},
        h('span',{style:{width:8,height:8,borderRadius:'50%',background:'#0f6e56',display:'inline-block',flexShrink:0}}),
        h('span',{className:'nav-label'},'Explore Later'),
        h('span',{className:'sidebar-cat-count',style:{marginLeft:'auto',fontSize:11,color:'var(--text-muted)'}},ideas.filter(i=>i.status==='explore').length||'')
      ),
      h('div',{className:'nav-item'+(statusFilter==='archive'?' active':''),onClick:()=>{setView('capture');setStatusFilter(f=>f==='archive'?'':'archive');}},
        h('span',{style:{width:8,height:8,borderRadius:'50%',background:'#5f5e5a',display:'inline-block',flexShrink:0}}),
        h('span',{className:'nav-label'},'Archive'),
        h('span',{className:'sidebar-cat-count',style:{marginLeft:'auto',fontSize:11,color:'var(--text-muted)'}},ideas.filter(i=>i.status==='archive').length||'')
      ),
      h('div',{className:'sidebar-section'},'Categories'),
      categories.map(cat=>h('div',{key:cat,className:'nav-item',style:{fontSize:12,position:'relative'},
        onClick:e=>{if(e.target.closest('.sidebar-cat-actions'))return;setView('capture');setSearch(s=>s===cat?'':cat);}},
        h(CatIcon,{cat}),
        editCat===cat
          ?h('input',{className:'cat-title-edit',value:editCatVal,autoFocus:true,
              onClick:e=>e.stopPropagation(),
              onChange:e=>setEditCatVal(e.target.value),
              onBlur:finishEditCat,
              onKeyDown:e=>{if(e.key==='Enter')finishEditCat();if(e.key==='Escape')setEditCat(null);}
            })
          :h('span',{className:'nav-label'},cat),
        editCat!==cat&&h('div',{className:'sidebar-cat-actions'},
          h('span',{className:'sidebar-cat-count',style:{fontSize:11,color:'var(--text-muted)'}},ideas.filter(i=>i.category===cat).length||''),
          h('button',{className:'sidebar-cat-edit-btn',title:'Rename',onClick:e=>{e.stopPropagation();startEditCat(cat);}},h('i',{className:'ti ti-pencil'})),
          cat!=='Misc'&&h('button',{className:'sidebar-cat-edit-btn',title:'Delete',onClick:e=>{e.stopPropagation();upd({ideas:ideas.map(i=>i.category===cat?{...i,category:'Misc'}:i),categories:categories.filter(c=>c!==cat)});}},h('i',{className:'ti ti-trash'}))
        )
      )),
      h('div',{className:'nav-item sidebar-add-cat',style:{opacity:.6,fontSize:12},onClick:addCategory},h('i',{className:'ti ti-plus'}),h('span',{className:'nav-label'},'Add category')),
      h('div',{style:{flex:1}}),
      h('button',{className:'dark-toggle',onClick:()=>setDarkMode(d=>!d),title:'Toggle dark mode'},
        h('i',{className:'ti '+(darkMode?'ti-sun':'ti-moon')}),
        h('span',{className:'nav-label'},darkMode?'Light mode':'Dark mode')
      ),
      h('div',{className:'sidebar-section'},'Sync'),
      h('div',{className:'nav-item',style:{fontSize:12},onClick:exportJSON},h('i',{className:'ti ti-download'}),h('span',{className:'nav-label'},'Export JSON')),
      h('div',{className:'nav-item',style:{fontSize:12},onClick:()=>document.getElementById('import-input').click()},h('i',{className:'ti ti-upload'}),h('span',{className:'nav-label'},'Import JSON')),
      h('input',{id:'import-input',type:'file',accept:'.json',style:{display:'none'},onChange:importJSON}),
      exportMsg&&h('div',{className:'export-msg'},exportMsg),
    ),
    h('div',{className:'main'},
      h('div',{className:'topbar'},
        h('div',{className:'search-wrap'},h('i',{className:'ti ti-search'}),h('input',{type:'text',placeholder:'Search ideas or status...',value:search,onChange:e=>setSearch(e.target.value)}))
      ),
      h('div',{className:'content'},
        view==='focus'&&h(FocusView,{ideas,onUpdate:updateIdea}),
        view==='map'&&h(MapView,{ideas:filtered,categories,connections}),
        view==='week'&&h('div',{style:{width:'100%'}},h(WeekView,{ideas})),
        view==='capture'&&h('div',{style:{width:'100%'},
          onDragOver:e=>{if(e.dataTransfer.types.includes('Files')){e.preventDefault();setDropActive(true);}},
          onDragLeave:e=>{if(!e.currentTarget.contains(e.relatedTarget))setDropActive(false);},
          onDrop:e=>{
            if(e.dataTransfer.files&&e.dataTransfer.files.length>0){
              e.preventDefault();setDropActive(false);
              processImportFile(e.dataTransfer.files[0]);
            }
          }
        },
          dropActive&&h('div',{className:'drop-zone drag-active'},
            h('i',{className:'ti ti-file-import'}),
            'Drop your braindump JSON here'
          ),
          !dropActive&&h('div',{className:'drop-zone',onClick:()=>document.getElementById('import-input').click()},
            h('i',{className:'ti ti-brand-google-drive'}),
            'Drop JSON from Google Drive here',
            h('span',null,'or click to browse files')
          ),
          h('div',{className:'capture-box'},
            h('div',{className:'capture-row'},
              h('textarea',{ref:taRef,className:'capture-textarea',placeholder:'Dump a thought...',value:text,onChange:e=>setText(e.target.value),
                onKeyDown:e=>{
                  if((e.metaKey||e.ctrlKey)&&e.key==='Enter'){capture();}
                }}),
              h('div',{className:'capture-actions'},
                h('button',{className:'icon-btn'+(recording?' recording':''),onClick:recording?stopVoice:startVoice,title:recording?'Stop':'Voice'},h('i',{className:'ti '+(recording?'ti-microphone-off':'ti-microphone')})),
                h('button',{className:'btn primary',onClick:capture},h('i',{className:'ti ti-send'}),'Add')
              )
            ),
            aiMsg&&h('div',{className:'ai-status'},h('span',{className:'ai-dot'}),aiMsg)
          ),
          (()=>{
            const sortStarred=arr=>{
              const withDue=arr.filter(i=>i.dueDate).sort((a,b)=>new Date(a.dueDate)-new Date(b.dueDate));
              const noDue=arr.filter(i=>!i.dueDate);
              const starred=withDue.filter(i=>i.starred);
              const rest=withDue.filter(i=>!i.starred);
              return [...starred,...rest,...noDue.filter(i=>i.starred),...noDue.filter(i=>!i.starred)];
            };
            const revisit=sortStarred(filtered.filter(i=>i.status==='revisit'));
            const explore=sortStarred(filtered.filter(i=>i.status==='explore'));
            const unsorted=sortStarred(filtered.filter(i=>!i.status));
            const archived=sortStarred(filtered.filter(i=>i.status==='archive'));
            const sections=[
              {key:'revisit',label:'Revisit Soon',color:'#854f0b',bg:'#faeeda',ideas:revisit},
              {key:'explore',label:'Explore Later',color:'#0f6e56',bg:'#e1f5ee',ideas:explore},
              {key:'unsorted',label:'Unsorted',color:'var(--text-muted)',bg:'var(--surface-0)',ideas:unsorted,banner:true},
              {key:'archive',label:'Archive',color:'#5f5e5a',bg:'#f1efe8',ideas:archived},
            ];
            const makeCard=idea=>h(IdeaCard,{
              key:idea.id,idea,connections,
              dragging:dragId===idea.id,dragOver:dragOverId===idea.id,
              onDragStart:id=>setDragId(id),
              onDragEnd:()=>{setDragId(null);setDragOverId(null);},
              onDragOver:id=>setDragOverId(id),
              onDrop:()=>{setDragId(null);setDragOverId(null);},
              allCategories:categories,
              onUpdate:patch=>updateIdea(idea.id,patch),
              onDelete:()=>deleteIdea(idea.id),
              onConnect:id=>{setConnModal(id);setConnTarget('');}
            });
            return [
              ideas.length===0&&h('div',{key:'empty',className:'empty-state'},h('i',{className:'ti ti-brain'}),'Type a thought above.',h('br'),h('span',{style:{fontSize:12,opacity:.7}},'AI sorts it automatically.')),
              search&&filtered.length===0&&h('div',{key:'nosearch',className:'empty-state'},h('i',{className:'ti ti-search-off'}),'No ideas match "'+search+'"'),
              ...sections.map(sec=>sec.ideas.length===0?null:h(PrioritySection,{
                key:sec.key,sec,makeCard
              }))
            ];
          })()
        )
      )
    ),
    newCatModal&&h('div',{className:'overlay',onClick:e=>{if(e.target.className==='overlay')setNewCatModal(false);}},
      h('div',{className:'modal'},
        h('h3',null,'New category'),
        h('input',{type:'text',placeholder:'Category name...',value:newCatVal,autoFocus:true,
          onChange:e=>setNewCatVal(e.target.value),
          onKeyDown:e=>{if(e.key==='Enter')confirmAddCategory();if(e.key==='Escape')setNewCatModal(false);}}),
        h('div',{className:'modal-actions'},
          h('button',{className:'btn',onClick:()=>setNewCatModal(false)},'Cancel'),
          h('button',{className:'btn primary',onClick:confirmAddCategory},'Add')
        )
      )
    ),
    mergeModal&&h('div',{className:'overlay',onClick:e=>{if(e.target.className==='overlay')setMergeModal(null);}},
      h('div',{className:'modal'},
        h('h3',null,'Merge "'+mergeModal+'" into'),
        h('select',{defaultValue:'',onChange:e=>doMerge(e.target.value)},
          h('option',{value:''},('Select category...')),
          categories.filter(c=>c!==mergeModal).map(c=>h('option',{key:c,value:c},c))
        ),
        h('div',{className:'modal-actions'},h('button',{className:'btn',onClick:()=>setMergeModal(null)},'Cancel'))
      )
    ),
    connModal&&h('div',{className:'overlay',onClick:e=>{if(e.target.className==='overlay')setConnModal(null);}},
      h('div',{className:'modal'},
        h('h3',null,'Link to another idea'),
        h('select',{value:connTarget,onChange:e=>setConnTarget(e.target.value)},
          h('option',{value:''},'Pick an idea...'),
          ideas.filter(i=>i.id!==connModal).map(i=>h('option',{key:i.id,value:i.id},i.text.slice(0,70)))
        ),
        h('div',{className:'modal-actions'},
          h('button',{className:'btn',onClick:()=>setConnModal(null)},'Cancel'),
          h('button',{className:'btn primary',onClick:addConnection},'Link ideas')
        )
      )
    )
  );
}

ReactDOM.render(h(App),document.getElementById('app'));
</script>
</body>
</html>
